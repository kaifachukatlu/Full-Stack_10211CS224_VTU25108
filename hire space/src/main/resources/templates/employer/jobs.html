<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Manage Jobs')}"></head>
<body>
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="main-content">
        <div class="page-layout">
            <!-- Sidebar -->
            <aside class="sidebar-nav">
                <a th:href="@{/employer/dashboard}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a th:href="@{/employer/post-job}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Post a Job
                </a>
                <a th:href="@{/employer/jobs}" class="active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                    Manage Jobs
                </a>
            </aside>

            <!-- Main Area -->
            <div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h2>Manage Jobs</h2>
                    <a th:href="@{/employer/post-job}" class="btn-primary">Post New Job</a>
                </div>
                
                <div th:if="${param.success}" class="badge" style="background: #D1FAE5; color: #10B981; margin-bottom: 24px; padding: 12px; display: block;">
                    Job posted successfully!
                </div>

                <div class="card" style="padding: 0; overflow: hidden;">
                    <div th:if="${#lists.isEmpty(jobs)}" style="padding: 40px; text-align: center; color: var(--text-secondary);">
                        <p style="margin-bottom: 16px;">You don't have any active jobs.</p>
                        <a th:href="@{/employer/post-job}" class="btn-primary">Create Your First Job</a>
                    </div>
                    
                    <div class="table-container" style="border: none; border-radius: 0;" th:unless="${#lists.isEmpty(jobs)}">
                        <table>
                            <thead>
                                <tr>
                                    <th>Job Title</th>
                                    <th>Category</th>
                                    <th>Location</th>
                                    <th>Status</th>
                                    <th>Applicants</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="job : ${jobs}">
                                    <td style="font-weight: 500;" th:text="${job.title}">Title</td>
                                    <td th:text="${job.category}">Category</td>
                                    <td style="color: var(--text-secondary);" th:text="${job.location}">Location</td>
                                    <td><span class="badge blue" th:text="${job.status}">Status</span></td>
                                    <td><span class="badge" style="background: #F1F5F9;" th:text="${job.applicationCount}">0</span></td>
                                    <td>
                                        <a th:href="@{/employer/applicants/{id}(id=${job.id})}" class="btn-secondary" style="padding: 6px 12px; font-size: 0.85rem;">Review Applicants</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Nav -->
    <nav th:replace="~{fragments :: mobile-nav}"></nav>
    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
