<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Profile Settings')}"></head>
<body>
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="main-content">
        <div class="page-layout">
            <!-- Sidebar -->
            <aside class="sidebar-nav">
                <a th:href="@{/student/dashboard}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a th:href="@{/student/jobs}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    Find Jobs
                </a>
                <a th:href="@{/student/profile}" class="active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Profile Settings
                </a>
            </aside>

            <!-- Main Area -->
            <div>
                <h2 style="margin-bottom: 24px;">Profile Settings</h2>
                
                <div class="card" style="margin-bottom: 32px;">
                    <div style="display: flex; align-items: center; gap: 24px; margin-bottom: 32px;">
                        <div style="width: 80px; height: 80px; background: #EFF6FF; color: #2563EB; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700;" th:text="${#strings.substring(user.fullName,0,1)}">U</div>
                        <div>
                            <h3 style="margin-bottom: 4px;" th:text="${user.fullName}">Name</h3>
                            <p style="color: var(--text-secondary); margin-bottom: 8px;" th:text="${user.email}">Email</p>
                            <span class="badge blue">Candidate Profile</span>
                        </div>
                    </div>
                    
                    <hr style="border: none; border-top: 1px solid var(--border-color); margin: 0 -24px 24px;">

                    <h3 style="margin-bottom: 16px; font-size: 1.2rem;">Resume Management</h3>
                    
                    <div th:if="${error}" class="badge" style="background: #FEE2E2; color: #EF4444; width: 100%; margin-bottom: 16px; padding: 12px;" th:text="${error}"></div>
                    
                    <div th:if="${user.resumePath}" style="background: #F8FAFC; border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            <div>
                                <div style="font-weight: 500;">Current Resume Document</div>
                                <div style="font-size: 0.85rem; color: var(--status-success);">Active and ready to use for applications</div>
                            </div>
                        </div>
                        <a th:href="@{${user.resumePath}}" target="_blank" class="btn-secondary" style="padding: 8px 16px; font-size: 0.9rem;">View File</a>
                    </div>

                    <form action="/api/student/upload-resume" method="post" enctype="multipart/form-data" id="resumeForm">
                        <div class="form-group">
                            <label class="form-label">Upload New Resume</label>
                            <div style="border: 2px dashed var(--border-color); border-radius: var(--radius-md); padding: 32px; text-align: center; background: #F8FAFC; cursor: pointer; position: relative;" onclick="document.getElementById('resumeInput').click()">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--text-secondary); margin-bottom: 12px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                <div style="font-weight: 500; margin-bottom: 4px;">Click to upload or drag and drop</div>
                                <div style="font-size: 0.85rem; color: var(--text-secondary);">PDF, DOC, DOCX (Max 5MB)</div>
                                <input type="file" id="resumeInput" name="resume" accept=".pdf,.doc,.docx" required style="position: absolute; width: 1px; height: 1px; opacity: 0;">
                            </div>
                            <div id="fileNameDisplay" style="margin-top: 8px; font-size: 0.9rem; color: var(--accent-primary); font-weight: 500; display: none;"></div>
                        </div>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn-primary">Save Resume</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Nav -->
    <nav th:replace="~{fragments :: mobile-nav}"></nav>
    <div th:replace="~{fragments :: scripts}"></div>
    <script>
        document.getElementById('resumeInput').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name;
            const display = document.getElementById('fileNameDisplay');
            if(fileName) {
                display.textContent = 'Selected file: ' + fileName;
                display.style.display = 'block';
            } else {
                display.style.display = 'none';
            }
        });

        document.getElementById('resumeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const btn = form.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'Uploading...';
            
            try {
                const res = await fetch(form.action, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if(data.success) {
                    showToast('Resume uploaded successfully!');
                    setTimeout(() => window.location.reload(), 1000);
                } else {
                    showToast(data.message, 'error');
                }
            } catch(err) {
                showToast('Upload failed', 'error');
            } finally {
                btn.innerText = originalText;
            }
        });
    </script>
</body>
</html>
