<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Employer Dashboard')}"></head>
<body>
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="main-content">
        <div class="page-layout">
            <!-- Sidebar -->
            <aside class="sidebar-nav">
                <a th:href="@{/employer/dashboard}" class="active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a th:href="@{/employer/post-job}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Post a Job
                </a>
                <a th:href="@{/employer/jobs}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                    Manage Jobs
                </a>
            </aside>

            <!-- Main Area -->
            <div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h2>Welcome, <span th:text="${user.fullName}"></span></h2>
                    <a th:href="@{/employer/post-job}" class="btn-primary">Post New Job</a>
                </div>
                
                <div class="dashboard-grid" style="margin-bottom: 32px;">
                    <div class="stat-card">
                        <div class="stat-label">Active Job Postings</div>
                        <div class="stat-value" th:text="${totalJobs}">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Applicants</div>
                        <div class="stat-value" th:text="${totalApplicants}">0</div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 24px;">
                    <!-- Chart Section -->
                    <div class="card">
                        <h3 style="margin-bottom: 16px; font-size: 1.1rem;">Application Stats</h3>
                        <div style="width: 100%; aspect-ratio: 1; position: relative;">
                            <canvas id="statsChart"></canvas>
                        </div>
                    </div>
                    
                    <!-- Recent Jobs Section -->
                    <div class="card" style="padding: 0; overflow: hidden;">
                        <div style="padding: 24px 24px 16px;">
                            <h3 style="font-size: 1.1rem;">Recent Job Postings</h3>
                        </div>
                        
                        <div th:if="${#lists.isEmpty(jobs)}" style="padding: 24px; text-align: center; color: var(--text-secondary);">
                            No jobs posted yet.
                        </div>
                        
                        <div class="table-container" style="border: none; border-radius: 0;" th:unless="${#lists.isEmpty(jobs)}">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Job Title</th>
                                        <th>Date Posted</th>
                                        <th>Applicants</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="job : ${jobs}">
                                        <td style="font-weight: 500;" th:text="${job.title}">Job Title</td>
                                        <td style="color: var(--text-secondary);" th:text="${#temporals.format(job.postedAt, 'MMM dd, yyyy')}">Date</td>
                                        <td>
                                            <span class="badge blue" th:text="${job.applicationCount}">0</span>
                                        </td>
                                        <td>
                                            <a th:href="@{/employer/applicants/{id}(id=${job.id})}" class="btn-secondary" style="padding: 6px 12px; font-size: 0.85rem;">Review</a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Nav -->
    <nav th:replace="~{fragments :: mobile-nav}"></nav>
    <div th:replace="~{fragments :: scripts}"></div>
    <!-- Chart.js Integration -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const pending = /*[[${pendingCount}]]*/ 0;
        const shortlisted = /*[[${shortlistedCount}]]*/ 0;
        const rejected = /*[[${rejectedCount}]]*/ 0;

        const ctx = document.getElementById('statsChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Pending', 'Shortlisted', 'Rejected'],
                datasets: [{
                    data: [pending, shortlisted, rejected],
                    backgroundColor: [
                        '#F59E0B', 
                        '#10B981', 
                        '#EF4444'  
                    ],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '75%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            font: { family: "'Inter', sans-serif" },
                            usePointStyle: true,
                            padding: 20
                        }
                    }
                }
            }
        });
        /*]]>*/
    </script>
</body>
</html>
