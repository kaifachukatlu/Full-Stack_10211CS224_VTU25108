<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Post New Job')}"></head>
<body>
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="main-content">
        <div class="page-layout">
            <!-- Sidebar -->
            <aside class="sidebar-nav">
                <a th:href="@{/employer/dashboard}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a th:href="@{/employer/post-job}" class="active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Post a Job
                </a>
                <a th:href="@{/employer/jobs}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                    Manage Jobs
                </a>
            </aside>

            <!-- Main Area -->
            <div>
                <h2 style="margin-bottom: 24px;">Post a New Job</h2>
                
                <div class="card">
                    <form th:action="@{/employer/post-job}" th:object="${jobDto}" method="post">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="form-group" style="margin-bottom: 0;">
                                <label class="form-label">Job Title *</label>
                                <input type="text" th:field="*{title}" class="form-control" placeholder="e.g. Senior Frontend Engineer" required>
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label class="form-label">Company Name *</label>
                                <input type="text" th:field="*{company}" class="form-control" placeholder="e.g. Acme Corp" required>
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label class="form-label">Location</label>
                                <input type="text" th:field="*{location}" class="form-control" placeholder="e.g. New York, NY or Remote">
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label class="form-label">Salary Range</label>
                                <input type="text" th:field="*{salary}" class="form-control" placeholder="e.g. $100k - $120k">
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label class="form-label">Job Type</label>
                                <select th:field="*{jobType}" class="form-control">
                                    <option value="FULL_TIME">Full Time</option>
                                    <option value="PART_TIME">Part Time</option>
                                    <option value="INTERNSHIP">Internship</option>
                                </select>
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label class="form-label">Category</label>
                                <input type="text" th:field="*{category}" class="form-control" placeholder="e.g. Engineering, Marketing">
                            </div>
                        </div>
                        
                        <div class="form-group" style="margin-top: 20px;">
                            <label class="form-label">Job Description *</label>
                            <textarea th:field="*{description}" class="form-control" rows="6" placeholder="Describe the responsibilities, requirements, and benefits..." required></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Required Skills</label>
                            <input type="text" th:field="*{skillsRequired}" class="form-control" placeholder="e.g. Java, React, SQL (comma separated)">
                        </div>
                        
                        <div style="margin-top: 32px; display: flex; justify-content: flex-end; gap: 16px;">
                            <a th:href="@{/employer/dashboard}" class="btn-secondary">Cancel</a>
                            <button type="submit" class="btn-primary">Publish Job Post</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Nav -->
    <nav th:replace="~{fragments :: mobile-nav}"></nav>
    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
