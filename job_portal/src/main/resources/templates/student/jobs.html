<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Find Jobs')}"></head>
<body>
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="main-content">
        <div class="page-layout">
            <!-- Sidebar Filters -->
            <aside class="sidebar-nav" style="padding: 24px;">
                <h3 style="margin-bottom: 16px; font-size: 1.1rem;">Filters</h3>
                
                <div style="margin-bottom: 24px;">
                    <label class="form-label">Search</label>
                    <form onsubmit="event.preventDefault(); fetchLiveJobs(document.getElementById('jobSearch').value);">
                        <input type="text" id="jobSearch" class="form-control" placeholder="Job Title or Company">
                    </form>
                </div>
                
                <div style="margin-bottom: 24px;">
                    <label class="form-label">Job Type</label>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <label style="display: flex; align-items: center; gap: 8px; color: var(--text-secondary); cursor: pointer;">
                            <input type="checkbox" checked style="accent-color: var(--accent-primary);"> Full-time
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; color: var(--text-secondary); cursor: pointer;">
                            <input type="checkbox" style="accent-color: var(--accent-primary);"> Part-time
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; color: var(--text-secondary); cursor: pointer;">
                            <input type="checkbox" style="accent-color: var(--accent-primary);"> Contract
                        </label>
                    </div>
                </div>

                <div>
                    <label class="form-label">Work Mode</label>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <label style="display: flex; align-items: center; gap: 8px; color: var(--text-secondary); cursor: pointer;">
                            <input type="checkbox" checked style="accent-color: var(--accent-primary);"> Remote
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; color: var(--text-secondary); cursor: pointer;">
                            <input type="checkbox" style="accent-color: var(--accent-primary);"> Hybrid
                        </label>
                    </div>
                </div>
            </aside>

            <!-- Main Area -->
            <div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h2 style="font-size: 1.5rem;">Recommended Jobs</h2>
                    <span style="color: var(--text-secondary); font-size: 0.9rem;" th:text="${#lists.size(jobs) + ' jobs found'}">0 jobs found</span>
                </div>
                
                <div class="dashboard-grid">
                    <div th:each="job : ${jobs}" class="card job-card">
                        <!-- Bookmark icon toggle -->
                        <button class="btn-icon" style="position: absolute; top: 16px; right: 16px;" onclick="this.querySelector('svg').classList.toggle('filled'); this.querySelector('svg').style.fill = this.querySelector('svg').classList.contains('filled') ? 'currentColor' : 'none';">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                        </button>
                        
                        <div class="job-header">
                            <div class="company-logo" th:text="${#strings.substring(job.company,0,1)}">C</div>
                            <div>
                                <h3 style="font-size: 1.1rem; margin-bottom: 4px;" th:text="${job.title}">Job Title</h3>
                                <div style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;" th:text="${job.company}">Company</div>
                            </div>
                        </div>
                        
                        <div class="job-meta">
                            <span class="badge" style="background: #F1F5F9;">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"></circle><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path></svg>
                                <span th:text="${job.location}">Location</span>
                            </span>
                            <span class="badge blue">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                                <span th:text="${job.salary}">Salary</span>
                            </span>
                        </div>
                        
                        <p style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5; flex-grow: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;" th:text="${job.description}">Description...</p>
                        
                        <div style="margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 0.85rem; color: var(--text-secondary);">Posted recently</span>
                            <button class="btn-primary" style="padding: 8px 16px; font-size: 0.9rem;" th:onclick="'document.getElementById(\'modal-' + ${job.id} + '\').style.display=\'flex\''">Apply Now</button>
                        </div>
                        
                    </div>

                    <div th:if="${#lists.isEmpty(jobs)}" style="grid-column: 1 / -1; padding: 40px; text-align: center; border: 1px solid var(--border-color); border-radius: var(--radius-lg); background: var(--bg-surface);">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-secondary); margin-bottom: 16px;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <h3 style="margin-bottom: 8px;">No jobs found</h3>
                        <p style="color: var(--text-secondary);">Try adjusting your search or filters.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Job Application Modals -->
    <th:block th:each="job : ${jobs}">
        <div th:id="'modal-' + ${job.id}" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.8); z-index:9999; align-items:center; justify-content:center; padding: 20px;">
            <div class="card" style="width:100%; max-width:500px; position:relative;">
                <button class="btn-icon" th:onclick="'document.getElementById(\'modal-' + ${job.id} + '\').style.display=\'none\''" style="position:absolute; top:16px; right:16px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
                
                <h3 style="margin-bottom:8px;">Apply for <span th:text="${job.title}"></span></h3>
                <p style="color: var(--text-secondary); margin-bottom: 24px;" th:text="${job.company}"></p>
                
                <form th:onsubmit="applyForJob(event, [[${job.id}]])">
                    <div class="form-group">
                        <label class="form-label">Cover Letter (Optional)</label>
                        <textarea name="coverLetter" class="form-control" rows="4" placeholder="Introduce yourself..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Resume Attachment</label>
                        <input type="file" name="resume" class="form-control" accept=".pdf,.doc,.docx" style="padding: 8px;">
                        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px;">Leave blank to use your profile's active resume.</p>
                    </div>
                    <button type="submit" class="btn-primary" style="width:100%;">Submit Application</button>
                </form>
            </div>
        </div>
    </th:block>

    <!-- Mobile Nav -->
    <nav th:replace="~{fragments :: mobile-nav}"></nav>
    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
