<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Sign up for HireSpace')}"></head>
<body>
    <div class="auth-wrapper">
        <div class="auth-sidebar" style="background: linear-gradient(135deg, #1E293B, #0F172A);">
            <a th:href="@{/}" style="color: white; font-size: 1.5rem; font-weight: 800; text-decoration: none; display: flex; align-items: center; gap: 8px; margin-bottom: auto; position: relative; z-index: 1;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
                HireSpace
            </a>
            <div style="position: relative; z-index: 1;">
                <h1 style="font-size: 3rem; margin-bottom: 24px; line-height: 1.1; color: white;">Start your journey today.</h1>
                <p style="font-size: 1.1rem; opacity: 0.8; max-width: 400px;">Join thousands of professionals finding their dream roles and companies finding top talent.</p>
            </div>
            <div style="margin-top: auto;"></div>
        </div>
        
        <div class="auth-main">
            <div class="auth-card card">
                <h2 style="font-size: 1.8rem; margin-bottom: 8px;">Create an account</h2>
                <p style="color: var(--text-secondary); margin-bottom: 32px;">Already have an account? <a th:href="@{/login}">Log in</a></p>
                
                <div th:if="${error}" class="badge" style="background: #FEE2E2; color: #EF4444; width: 100%; margin-bottom: 24px; padding: 12px;" th:text="${error}">
                    Error message here.
                </div>

                <form th:action="@{/register}" th:object="${user}" method="post">
                    <div style="display: flex; gap: 16px; margin-bottom: 20px;">
                        <label style="flex: 1; border: 1px solid var(--border-color); padding: 12px; border-radius: var(--radius-md); text-align: center; cursor: pointer; transition: all 0.2s;">
                            <input type="radio" name="role" value="STUDENT" required style="accent-color: var(--accent-primary); margin-right: 8px;" th:checked="${param.type == null or param.type[0] != 'employer'}">
                            I'm a Candidate
                        </label>
                        <label style="flex: 1; border: 1px solid var(--border-color); padding: 12px; border-radius: var(--radius-md); text-align: center; cursor: pointer; transition: all 0.2s;">
                            <input type="radio" name="role" value="EMPLOYER" style="accent-color: var(--accent-primary); margin-right: 8px;" th:checked="${param.type != null and param.type[0] == 'employer'}">
                            I'm an Employer
                        </label>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Full name</label>
                        <input type="text" name="name" class="form-control" placeholder="Jane Doe" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email address</label>
                        <input type="email" name="username" class="form-control" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Create a password" required minlength="6">
                    </div>
                    
                    <button type="submit" class="btn-primary" style="width: 100%; padding: 14px; font-size: 1.1rem; margin-top: 16px;">Sign up</button>
                    
                    <p style="font-size: 0.85rem; color: var(--text-secondary); text-align: center; margin-top: 24px;">
                        By clicking Sign up, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
                    </p>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
