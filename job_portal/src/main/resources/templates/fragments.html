<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title th:text="${title}">Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <!-- CSRF Meta Tags for AJAX -->
    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>
</head>
<body>

<nav th:fragment="navbar" class="navbar">
    <a th:href="@{/}" class="navbar-brand">
        <svg class="logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
            <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
        HireSpace
    </a>
    <div class="nav-links">
        <!-- Not logged in -->
        <a th:if="${#authentication.principal == 'anonymousUser'}" th:href="@{/login}">Log in</a>
        <a th:if="${#authentication.principal == 'anonymousUser'}" th:href="@{/register}" class="btn-primary" style="color: white; padding: 10px 20px;">Sign up</a>
        
        <!-- Logged in as Student -->
        <a th:if="${#authorization.expression('hasRole(''STUDENT'')')}" th:href="@{/student/dashboard}">Dashboard</a>
        <a th:if="${#authorization.expression('hasRole(''STUDENT'')')}" th:href="@{/student/jobs}">Find Jobs</a>
        <a th:if="${#authorization.expression('hasRole(''STUDENT'')')}" th:href="@{/student/profile}">Profile</a>
        
        <!-- Logged in as Employer -->
        <a th:if="${#authorization.expression('hasRole(''EMPLOYER'')')}" th:href="@{/employer/dashboard}">Dashboard</a>
        <a th:if="${#authorization.expression('hasRole(''EMPLOYER'')')}" th:href="@{/employer/post-job}">Post a Job</a>
        <a th:if="${#authorization.expression('hasRole(''EMPLOYER'')')}" th:href="@{/employer/jobs}">Manage Jobs</a>
        
        <!-- Logout Form -->
        <form th:if="${#authentication.principal != 'anonymousUser'}" th:action="@{/logout}" method="post" style="display:inline; margin-left: 10px;">
            <button type="submit" class="btn-secondary" style="padding: 10px 20px;">Log out</button>
        </form>
    </div>
</nav>

<!-- Mobile Bottom Navigation -->
<nav th:fragment="mobile-nav" class="mobile-bottom-nav">
    <!-- Links adapt based on auth role -->
    <a th:href="@{/}" class="mobile-nav-link">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>Home</span>
    </a>
    
    <!-- Student specific -->
    <th:block th:if="${#authorization.expression('hasRole(''STUDENT'')')}">
        <a th:href="@{/student/jobs}" class="mobile-nav-link">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <span>Search</span>
        </a>
        <a th:href="@{/student/dashboard}" class="mobile-nav-link">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span>Dash</span>
        </a>
    </th:block>
    
    <!-- Employer specific -->
    <th:block th:if="${#authorization.expression('hasRole(''EMPLOYER'')')}">
        <a th:href="@{/employer/post-job}" class="mobile-nav-link">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            <span>Post</span>
        </a>
        <a th:href="@{/employer/dashboard}" class="mobile-nav-link">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span>Dash</span>
        </a>
    </th:block>

    <a th:if="${#authentication.principal == 'anonymousUser'}" th:href="@{/login}">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
        <span>Login</span>
    </a>
</nav>

<div th:fragment="scripts">
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script th:src="@{/js/script.js}"></script>
    <div id="toast-container" class="toast-container"></div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var path = window.location.pathname;
            document.querySelectorAll('.mobile-nav-link').forEach(function(link) {
                if (link.getAttribute('href') === path || (path !== '/' && link.getAttribute('href') !== '/' && path.includes(link.getAttribute('href')))) {
                    link.classList.add('active');
                }
            });
        });
    </script>
</div>

</body>
</html>
