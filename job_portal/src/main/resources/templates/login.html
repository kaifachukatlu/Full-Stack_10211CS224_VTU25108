<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Log in to HireSpace')}"></head>
<body>
    <div class="auth-wrapper">
        <div class="auth-sidebar">
            <a th:href="@{/}" style="color: white; font-size: 1.5rem; font-weight: 800; text-decoration: none; display: flex; align-items: center; gap: 8px; margin-bottom: auto; position: relative; z-index: 1;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
                HireSpace
            </a>
            <div style="position: relative; z-index: 1;">
                <h1 style="font-size: 3rem; margin-bottom: 24px; line-height: 1.1; color: white;">Welcome back to your next opportunity.</h1>
                <p style="font-size: 1.1rem; opacity: 0.8; max-width: 400px;">Access your saved jobs, applications, and personalized recommendations.</p>
            </div>
            <div style="margin-top: auto;"></div>
        </div>
        
        <div class="auth-main">
            <div class="auth-card card">
                <h2 style="font-size: 1.8rem; margin-bottom: 8px;">Log in</h2>
                <p style="color: var(--text-secondary); margin-bottom: 32px;">Don't have an account? <a th:href="@{/register}">Sign up</a></p>
                
                <div th:if="${param.error}" class="badge" style="background: #FEE2E2; color: #EF4444; width: 100%; margin-bottom: 24px; padding: 12px;">
                    Invalid username or password.
                </div>
                <div th:if="${param.logout}" class="badge" style="background: #D1FAE5; color: #10B981; width: 100%; margin-bottom: 24px; padding: 12px;">
                    You have been logged out successfully.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="form-group">
                        <label class="form-label">Email address</label>
                        <input type="text" id="username" name="username" class="form-control" placeholder="name@example.com" required autofocus>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--text-secondary); cursor: pointer;">
                            <input type="checkbox" style="width: 16px; height: 16px; accent-color: var(--accent-primary);"> Remember me
                        </label>
                        <a href="#" style="font-size: 0.9rem;">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; padding: 14px; font-size: 1.1rem;">Log in</button>
                    
                    <div style="margin: 24px 0; display: flex; align-items: center; text-align: center; color: var(--text-secondary);">
                        <div style="flex: 1; border-bottom: 1px solid var(--border-color);"></div>
                        <span style="padding: 0 16px; font-size: 0.9rem;">or continue with</span>
                        <div style="flex: 1; border-bottom: 1px solid var(--border-color);"></div>
                    </div>
                    
                    <div style="display: flex; gap: 16px;">
                        <a th:href="@{/mock-social-login/google}" class="btn-secondary" style="flex: 1; text-align: center; text-decoration: none;">Google</a>
                        <a th:href="@{/mock-social-login/linkedin}" class="btn-secondary" style="flex: 1; text-align: center; text-decoration: none;">LinkedIn</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
