<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Applicants - ' + ${job.title})}"></head>
<body>
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="main-content">
        <div style="margin-bottom: 24px;">
            <a th:href="@{/employer/jobs}" style="display: inline-flex; align-items: center; gap: 8px; color: var(--text-secondary); margin-bottom: 12px; font-weight: 500;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Jobs
            </a>
            <h2>Applicants for: <span th:text="${job.title}" style="color: var(--accent-primary);"></span></h2>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <div style="display: flex; gap: 16px;">
                <select id="tableFilter" class="form-control" style="width: 240px;">
                    <option value="all">All Applicants</option>
                    <option value="pending">Status: Pending</option>
                    <option value="shortlisted">Status: Shortlisted</option>
                    <option value="rejected">Status: Rejected</option>
                </select>
            </div>
            <div>
                <a th:href="@{/employer/export-applicants/{id}(id=${job.id})}" class="btn-secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Export to CSV
                </a>
            </div>
        </div>

        <div class="card" style="padding: 0; overflow: hidden;">
            <div th:if="${#lists.isEmpty(applications)}" style="padding: 40px; text-align: center; color: var(--text-secondary);">
                <p>No applications received yet for this job.</p>
            </div>
            
            <div class="table-container" style="border: none; border-radius: 0;" th:unless="${#lists.isEmpty(applications)}">
                <table>
                    <thead>
                        <tr>
                            <th>Candidate Name</th>
                            <th>Applied On</th>
                            <th>Cover Letter</th>
                            <th>Resume</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="app : ${applications}">
                            <td style="font-weight: 500;" th:text="${app.applicant.fullName}">Name</td>
                            <td style="color: var(--text-secondary);" th:text="${#temporals.format(app.appliedAt, 'MMM dd, yyyy')}">Date</td>
                            <td>
                                <button class="btn-secondary" style="padding: 4px 12px; font-size: 0.85rem;" 
                                        th:data-cover="${app.coverLetter != null ? app.coverLetter : 'No cover letter provided.'}"
                                        onclick="alert(this.getAttribute('data-cover'))">Read</button>
                            </td>
                            <td>
                                <a th:if="${app.resumeSnapshot}" th:href="@{${app.resumeSnapshot}}" target="_blank" style="display: inline-flex; align-items: center; gap: 4px; font-size: 0.9rem;">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                                    View
                                </a>
                                <span th:unless="${app.resumeSnapshot}" style="color: var(--text-secondary); font-size: 0.9rem;">No resume</span>
                            </td>
                            <td>
                                <span class="badge" th:classappend="${app.status.name() == 'PENDING'} ? 'blue' : ''" th:text="${app.status}"></span>
                            </td>
                            <td>
                                <select class="form-control" style="padding: 6px 12px; width: auto; font-size: 0.85rem;"
                                        th:onchange="'updateStatus(' + ${app.id} + ', this.value)'">
                                    <option value="" disabled selected>Update Status</option>
                                    <option value="SHORTLISTED">Shortlist</option>
                                    <option value="REJECTED">Reject</option>
                                    <option value="PENDING">Pending</option>
                                </select>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Mobile Nav -->
    <nav th:replace="~{fragments :: mobile-nav}"></nav>
    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
